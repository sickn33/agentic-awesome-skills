name: Sync Upstream

on:
  schedule:
    # Runs every day at 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch:
    # Also allows manual trigger from the Actions tab

jobs:
  sync:
    name: Sync fork with upstream
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: git remote add upstream https://github.com/sickn33/antigravity-awesome-skills.git

      - name: Fetch upstream
        run: git fetch upstream

      - name: Check for new commits
        id: check
        run: |
          BEHIND=$(git rev-list --count HEAD..upstream/main)
          echo "behind=$BEHIND" >> "$GITHUB_OUTPUT"
          echo "Upstream is $BEHIND commits ahead"

      - name: Merge upstream into fork
        if: steps.check.outputs.behind != '0'
        run: |
          git merge upstream/main --no-edit \
            -m "chore: sync upstream $(date +'%Y-%m-%d')"

      - name: Push to fork
        if: steps.check.outputs.behind != '0'
        run: git push origin main

      - name: Already up to date
        if: steps.check.outputs.behind == '0'
        run: echo "Fork is already up to date with upstream. Nothing to do."
