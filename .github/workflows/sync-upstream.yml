name: Sync Upstream

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  sync:
    name: Sync fork with upstream
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: git remote add upstream https://github.com/sickn33/antigravity-awesome-skills.git

      - name: Fetch upstream
        run: git fetch upstream

      - name: Check for new commits
        id: check
        run: |
          BEHIND=$(git rev-list --count HEAD..upstream/main)
          echo "behind=$BEHIND" >> "$GITHUB_OUTPUT"
          echo "Upstream is $BEHIND commits ahead"

      - name: Get commit summary
        id: summary
        if: steps.check.outputs.behind != '0'
        run: |
          LOG=$(git log HEAD..upstream/main --oneline --no-merges | head -20)
          echo "log<<EOF" >> "$GITHUB_OUTPUT"
          echo "$LOG" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Merge upstream into fork
        if: steps.check.outputs.behind != '0'
        run: |
          git merge upstream/main --no-edit \
            -m "chore: sync upstream $(date +'%Y-%m-%d')"

      - name: Push to fork
        if: steps.check.outputs.behind != '0'
        run: git push origin main

      - name: Send email notification
        if: steps.check.outputs.behind != '0'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USER }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "🆕 antigravity-awesome-skills — ${{ steps.check.outputs.behind }} new commits synced"
          to: markeverest22@gmail.com
          from: "GitHub Actions <${{ secrets.GMAIL_USER }}>"
          body: |
            Hi Mark,

            Your fork has been automatically synced with upstream.

            📅 Date: ${{ github.run_number }} — ${{ github.event.head_commit.timestamp }}
            📦 New commits merged: ${{ steps.check.outputs.behind }}

            Recent changes:
            ${{ steps.summary.outputs.log }}

            🔗 View repo: https://github.com/markeverest22/antigravity-awesome-skills

            —
            Sent automatically by GitHub Actions

      - name: Already up to date
        if: steps.check.outputs.behind == '0'
        run: echo "Fork is already up to date. No email sent."
