<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>CATALOG.md — Rendered</title>
  <style>
    body{font-family:Inter,ui-sans-serif,system-ui,Segoe UI,Roboto,"Helvetica Neue",Arial;margin:24px;color:#0b1220}
    .container{max-width:1200px;margin:0 auto}
    pre{white-space:pre-wrap}
    table{border-collapse:collapse;width:100%;overflow:auto}
    th,td{border:1px solid #ddd;padding:6px 8px;text-align:left}
    thead th{background:#f6f8fa}
    header{margin-bottom:20px}
    .meta{color:#6b7280;font-size:0.95rem}
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Skill Catalog</h1>
      <div class="meta">Rendered version of <strong>CATALOG.md</strong></div>
    </header>

    <div id="content">Rendering…</div>

    <hr>
    <footer class="meta">Generated by GitHub Copilot assistant — correzioni minime applicate client-side.</footer>
  </div>

  <script id="md" type="text/plain"># CATALOG.md

Fallback: the full markdown is not embedded. To render the complete catalog, serve this folder via a static HTTP server (example: python -m http.server) and the page will fetch CATALOG.md automatically.</script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    (function(){
      const render = (md) => {
        md = md.replace(/\.\.\./g, '…').replace(/ {2,}/g,' ');
        try { document.getElementById('content').innerHTML = marked.parse(md, {gfm:true, breaks:true}); }
        catch(e){ document.getElementById('content').textContent = 'Erro nel render Markdown: ' + e.message; }
      };
      fetch('CATALOG.md').then(r=>{ if(!r.ok) throw new Error('HTTP '+r.status); return r.text(); }).then(text=>render(text)).catch(()=>{
        const mdEl = document.getElementById('md'); render(mdEl ? mdEl.textContent : '# CATALOG.md not available');
      });
    })();
  </script>
